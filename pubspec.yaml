name: egyzone
description: A new Flutter project.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core UI and responsive design
  sizer: ^3.1.3
  flutter_svg: ^2.0.9
  google_fonts: ^8.0.2
  shared_preferences: ^2.2.2
  web: ^1.1.1
  flutter_rating_bar: ^4.0.1
  intl: ^0.20.2

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  connectivity_plus: ^7.0.0

  # Feature dependencies
  cached_network_image: ^3.3.1
  fluttertoast: ^9.0.0
  fl_chart: ^1.1.1
  share_plus: ^13.1.0
  url_launcher: any
  image_picker: ^1.0.7
  http_parser: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

  image: any
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/Dell_inspiron/
